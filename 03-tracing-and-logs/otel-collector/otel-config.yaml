## OpenTelemetry Collector — receivers / processors / exporters
## Anchor: deck §6 (sampling math + semantic conventions).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 15s
          static_configs:
            - targets: ['localhost:8888']

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  resource:
    attributes:
      - key: deployment.environment
        value: lab
        action: upsert

exporters:
  otlp/jaeger:
    # Port 4317 = Jaeger OTLP gRPC (requires COLLECTOR_OTLP_ENABLED=true)
    # Port 14250 = Jaeger native gRPC (model.proto) — NOT OTLP, do NOT use
    endpoint: jaeger:4317
    tls:
      insecure: true

  loki/push:
    endpoint: http://loki:3100/loki/api/v1/push
    timeout: 5s

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/jaeger]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [loki/push]
    metrics:
      receivers: [otlp, prometheus]
      processors: [resource, batch]
      exporters: [debug]

  telemetry:
    logs:
      level: warn
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
